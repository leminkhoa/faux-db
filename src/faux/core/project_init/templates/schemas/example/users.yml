users:
  rows: 10
  columns:
    id:
      type: "faker"
      method: "uuid4"
      unique: true
    email:
      type: "faker"
      method: "email"
      bind_to: id
    segment:
      type: "provider"
      target: "UserSegmentProvider"
    welcome_line:
      type: "provider"
      target: "WelcomeLineProvider"
  output:
    format: csv
    filepath: "./outputs/users.csv"
