customer:
  rows: 30
  columns:
    id:
      type: "$faker"
      method: "uuid4"
      unique: true
    email:
      type: "$faker"
      method: "email"
      bind_to: id
    segment:
      type: "$provider"
      target: "CustomerSegmentProvider"
    welcome_line:
      type: "$provider"
      target: "CustomerWelcomeProvider"
    service_tier:
      type: "$provider"
      target: "NicknameProvider"
    created_at:
      type: "$faker"
      method: "date_between"
      params:
        start_date: "-1y"
        end_date: "today"
  output:
    format: csv
    filepath: "./outputs/customer.csv"
