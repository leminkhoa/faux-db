# schemas/ecommerce/customers.yml
customers:
  rows: 50
  columns:
    id:
      type: "$faker"
      method: "uuid4"
      unique: true

    name:
      type: "$faker"
      method: "name"

    age:
      type: "$faker"
      method: "random_int"
      params:
        min: 18
        max: 90
  output:
    format: csv
    filepath: "./outputs/customers.csv"
