order_items:
  rows: 300
  columns:
    id:
      type: "$faker"
      method: "uuid4"
      unique: true

    order_id:
      type: "$rel"
      target: "orders.order_id"
      strategy: random

    product_id:
      type: "$rel"
      target: "products.id"
      strategy: random

    quantity:
      type: "$faker"
      method: "random_int"
      params:
        min: 1
        max: 5
  output:
    format: csv
    filepath: "./outputs/order_items.csv"
