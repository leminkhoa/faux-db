# schemas/ecommerce/orders.yml
orders:
  rows: 100
  columns:
    order_id:
      type: "$faker"
      method: "uuid4"
      unique: true

    product_id:
      type: "$rel"
      target: "products.id"
      strategy: random

    customer_id:
      type: "$rel"
      target: "customers.id"
      strategy: random

    date_ordered:
      type: "$faker"
      method: "date_between"
      params:
        start_date: "-1w"
        end_date: "today"
  output:
    format: csv
    filepath: "./outputs/orders.csv"
