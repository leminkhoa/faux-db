MembershipProvider:
  type: "random_choice"
  choices: ['standard', 'gold', 'platinum', 'diamond']
  weights: [0.4, 0.3, 0.2, 0.1]

EmailDomainProvider:
  type: "random_choice"
  choices: ['com', 'org', 'gov']

CompanyProvider:
  type: "file_reader"
  filepath: "real_companies.csv"
  loaded_columns: ["name"]

FurnitureNameProvider:
  type: "template_choice"
  templates:
    - '{{ catalog("furniture.material") }} {{ catalog("furniture.furniture") }}'
    - '{{ catalog("furniture.color") }} @@@ {{ catalog("furniture.furniture") }}'


FurniturePriceProvider:
  type: "expression"
  exp: "{{ random_int(10, 500) }}"
