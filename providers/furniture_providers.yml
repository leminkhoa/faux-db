# Demonstrates combo-list and filter features of template_choice.
#
# 1. FurnitureComboNameProvider
#    Single-slot template → uniform over pre-merged phrases in
#    furniture.combos.product_phrases (deep catalog path, double quotes).
#
# 2. FurnitureFullNameProvider
#    Shows multiple filters in one file:
#    - implicit random (no pipe)
#    - explicit | first for a deterministic adjective slot
#    - | cycle for rotating materials
#    - | default(...) to guard an empty/missing key gracefully

FurnitureComboNameProvider:
  type: "template_choice"
  templates:
    - '{{ catalog("furniture.combos.product_phrases") }}'

FurnitureFullNameProvider:
  type: "template_choice"
  templates:
    - "{{ catalog('furniture.material') | cycle }} {{ catalog('furniture.furniture') }}"
    - "test"
